<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">

        <div class="card p-3">
            <div class="row g-3 align-items-center" th:object="${pizza}">

                <div class="col-md-4 text-center">
                    <img th:src="*{urlImg}" th:alt="*{name}" class="img-fluid rounded">
                </div>

                <div class="col-md-8">
                    <h2 th:text="*{name}"></h2>
                    <p th:text="*{description}"></p>
                    <h4 th:text="*{price + ' €'}" class="text-success"></h4>
                    <a th:href="@{/}" class="btn btn-primary mt-2">Torna alla lista</a>
                </div>

            </div>
        </div>

        <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Offerte Speciali</h4>
                <a th:href="@{/special-offer/create/{id}(id=${pizza.id})}" class="btn btn-success btn-sm">
                    Crea nuova offerta speciale
                </a>
            </div>

            <div th:if="${pizza.specialOffers.size() == 0}"
                class="alert alert-info mb-0">
                Nessuna offerta speciale disponibile per questa pizza.
            </div>

            <table th:if="${pizza.specialOffers.size() > 0}"
                class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Titolo</th>
                        <th class="text-center">Data Inizio</th>
                        <th class="text-center">Data Fine</th>
                        <th style="width: 100px;">Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="offer : ${pizza.specialOffers}">
                        <td th:text="${offer.title}"></td>
                        <td class="text-center" th:text="${offer.startDate}"></td>
                        <td class="text-center" th:text="${offer.endDate}"></td>
                        <td>
                            <a th:href="@{/special-offer/edit/{id}(id=${offer.id})}" class="btn btn-sm btn-warning">
                                Modifica
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>

</html>
